<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Agent Dashboard</title>
<style>
:root{--bg:#0d1117;--sur:#161b22;--bdr:#30363d;--txt:#e6edf3;--mut:#8b949e;--blu:#58a6ff;--grn:#3fb950;--org:#f0883e;--red:#f85149;--yel:#d29922;--pur:#bc8cff;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'SF Mono',Consolas,monospace;background:var(--bg);color:var(--txt);height:100vh;display:flex;flex-direction:column;overflow:hidden;}
/* header */
header{background:var(--sur);border-bottom:1px solid var(--bdr);padding:9px 18px;display:flex;align-items:center;gap:14px;flex-shrink:0;}
.dot{width:9px;height:9px;border-radius:50%;background:var(--grn);animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.aname{font-size:1.05em;font-weight:bold;color:var(--blu);}
.hmeta{color:var(--mut);font-size:.78em;}
/* layout */
.grid{display:grid;grid-template-columns:220px 220px 1fr;grid-template-rows:1fr auto;gap:10px;padding:10px;flex:1;min-height:0;}
/* card */
.card{background:var(--sur);border:1px solid var(--bdr);border-radius:8px;padding:11px;display:flex;flex-direction:column;overflow:hidden;}
.ctitle{font-size:.63em;font-weight:bold;color:var(--mut);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:9px;flex-shrink:0;}
/* inventory */
.rrow{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid #21262d;font-size:.83em;}
.rrow:last-child{border-bottom:none;}
.rname{color:var(--txt);}
.rname.g{color:var(--blu);}
.rqty{font-weight:bold;color:var(--org);}
.rqty.g{color:var(--grn);}
.rbadge{font-size:.62em;padding:1px 4px;background:#1f3a5f;color:var(--blu);border-radius:3px;margin-left:3px;}
/* goals */
.grow{margin-bottom:10px;}
.grow:last-child{margin-bottom:0;}
.glabel{display:flex;justify-content:space-between;font-size:.78em;margin-bottom:4px;}
.gres{color:var(--blu);}
.gcnt{color:var(--mut);}
.gcnt b{color:var(--org);}
.barbg{background:#21262d;border-radius:99px;height:7px;}
.barfill{height:7px;border-radius:99px;transition:width .6s;background:var(--grn);}
.barfill.done{background:var(--blu);}
/* feed */
.feedcard{grid-column:3;grid-row:1;}
.feed{flex:1;overflow-y:auto;min-height:0;}
.feed::-webkit-scrollbar{width:3px;}
.feed::-webkit-scrollbar-thumb{background:var(--bdr);border-radius:2px;}
.fi{padding:5px 8px;border-bottom:1px solid #21262d;font-size:.76em;line-height:1.45;display:flex;gap:6px;align-items:baseline;}
.fi .ts{color:var(--mut);font-size:.82em;flex-shrink:0;width:55px;}
.fi .tag{flex-shrink:0;padding:1px 5px;border-radius:3px;font-size:.7em;font-weight:bold;}
.fi .body{flex:1;word-break:break-word;}
.fi.ti{border-left:2px solid var(--blu);}
.fi.ta{border-left:2px solid var(--grn);}
.fi.tr{border-left:2px solid var(--red);}
.fi.to{border-left:2px solid var(--yel);}
.fi.td{border-left:2px solid var(--pur);}
.fi.tp{border-left:2px solid var(--bdr);}
.fi.ts2{border-left:2px solid var(--mut);}
.tag-i{background:#1f3a5f;color:var(--blu);}
.tag-a{background:#1a3a2a;color:var(--grn);}
.tag-r{background:#3a1a1a;color:var(--red);}
.tag-o{background:#3a2a1a;color:var(--yel);}
.tag-d{background:#2a1a3a;color:var(--pur);}
.tag-p{background:#21262d;color:var(--mut);}
.tag-s{background:#21262d;color:var(--mut);}
/* compose */
.compcard{grid-column:1/-1;grid-row:2;}
.compgrid{display:grid;grid-template-columns:185px 1fr auto;gap:9px;align-items:start;}
.flabel{font-size:.68em;color:var(--mut);margin-bottom:3px;}
select,textarea{width:100%;background:var(--bg);border:1px solid var(--bdr);color:var(--txt);border-radius:6px;padding:6px 9px;font-family:inherit;font-size:.8em;outline:none;}
select:focus,textarea:focus{border-color:var(--blu);}
textarea{resize:none;height:68px;}
.bgrp{display:flex;flex-direction:column;gap:5px;padding-top:17px;}
button{border:none;border-radius:6px;padding:6px 11px;cursor:pointer;font-family:inherit;font-size:.78em;font-weight:bold;transition:opacity .15s;}
button:hover{opacity:.8;}
.bp{background:#238636;color:#fff;}
.bs{background:#21262d;color:var(--txt);border:1px solid var(--bdr);}
</style>
</head>
<body>
<header>
  <div class="dot" id="dot"></div>
  <span class="aname" id="hName">—</span>
  <span class="hmeta">Puerto: <b id="hPort">—</b></span>
  <span class="hmeta" style="margin-left:auto">Butler: <span style="color:var(--blu)" id="hButler">—</span></span>
  <span class="hmeta" id="hClock"></span>
</header>

<div class="grid">
  <!-- Inventario -->
  <div class="card">
    <div class="ctitle">Inventario</div>
    <div id="inv" style="overflow-y:auto;flex:1">Cargando…</div>
  </div>

  <!-- Objetivos -->
  <div class="card">
    <div class="ctitle">Objetivos</div>
    <div id="goals" style="overflow-y:auto;flex:1">Cargando…</div>
  </div>

  <!-- Feed -->
  <div class="card feedcard">
    <div class="ctitle" style="display:flex;justify-content:space-between;align-items:center">
      Actividad en Tiempo Real
      <button class="bs" onclick="clearFeed()" style="padding:2px 7px;font-size:.65em">✕</button>
    </div>
    <div class="feed" id="feed"></div>
  </div>

  <!-- Compose -->
  <div class="card compcard">
    <div class="ctitle">Enviar Mensaje Manual</div>
    <div class="compgrid">
      <div>
        <div class="flabel">Destinatario</div>
        <select id="agSel"><option value="">— seleccionar —</option></select>
      </div>
      <div>
        <div class="flabel">Mensaje (texto libre o JSON)</div>
        <textarea id="msgBox" placeholder='{"kind":"request","resources":{"vino":2},"offered_resources":{"oro":3}}'></textarea>
      </div>
      <div class="bgrp">
        <button class="bp" onclick="sendMsg()">▶ Enviar</button>
        <button class="bs" onclick="fillGoal()">🎯 Pedir objetivo</button>
        <button class="bs" onclick="fillOffer()">📦 Ofrecer libres</button>
      </div>
    </div>
  </div>
</div>

<script>
let S = {inventory:{},goal_needs:{},initial_goal:{},target_resources:[]};
let AGENTS = [];
const ANAME = '__AGENT_NAME__';
document.getElementById('hName').textContent   = ANAME;
document.getElementById('hPort').textContent   = '__MY_PORT__';
document.getElementById('hButler').textContent = '__BUTLER_URL__';

// clock
setInterval(()=>{ document.getElementById('hClock').textContent = new Date().toLocaleTimeString(); }, 1000);

// ── State ──
function renderInv(s){
  const g = new Set(s.target_resources||[]);
  const e = Object.entries(s.inventory||{}).sort((a,b)=>{
    const ag=g.has(a[0]),bg=g.has(b[0]);
    return ag!==bg ? (ag?-1:1) : b[1]-a[1];
  });
  document.getElementById('inv').innerHTML = e.length
    ? e.map(([r,q])=>`<div class="rrow">
        <span class="rname ${g.has(r)?'g':''}">${r}${g.has(r)?'<span class="rbadge">🎯</span>':''}</span>
        <span class="rqty ${g.has(r)?'g':''}">${q}</span>
      </div>`).join('')
    : '<span style="color:var(--mut)">Vacío</span>';
}

function renderGoals(s){
  const gn=s.goal_needs||{}, ig=s.initial_goal||{};
  const all=[...new Set([...Object.keys(ig),...Object.keys(gn)])];
  if(!all.length){
    document.getElementById('goals').innerHTML='<div style="color:var(--grn);font-weight:bold">✓ ¡Todos completados!</div>';
    return;
  }
  document.getElementById('goals').innerHTML=all.map(r=>{
    const total=ig[r]||1, rem=gn[r]||0, recv=total-rem;
    const pct=Math.round(recv/total*100);
    return rem===0
      ? `<div class="grow"><div class="glabel"><span class="gres">${r}</span><span style="color:var(--grn)">✓ listo</span></div>
          <div class="barbg"><div class="barfill done" style="width:100%"></div></div></div>`
      : `<div class="grow"><div class="glabel"><span class="gres">${r}</span>
          <span class="gcnt">${recv}/${total} &nbsp;(<b>${rem}</b> faltan)</span></div>
          <div class="barbg"><div class="barfill" style="width:${pct}%"></div></div></div>`;
  }).join('');
}

async function poll(){
  try{
    const r=await fetch('/api/state');
    S=await r.json();
    renderInv(S); renderGoals(S);
  }catch(_){}
}

// ── Agents ──
async function pollAgents(){
  try{
    AGENTS=await(await fetch('/api/agents')).json()||[];
    const sel=document.getElementById('agSel'), cur=sel.value;
    sel.innerHTML='<option value="">— seleccionar —</option>';
    AGENTS.forEach(a=>{
      if(a.alias===ANAME) return;
      const o=document.createElement('option');
      o.value=a.ip; o.textContent=`${a.alias} (${a.ip})`;
      sel.appendChild(o);
    });
    if(cur) sel.value=cur;
  }catch(_){}
}

// ── Feed ──
const TAGS={
  inbox:   ['INBOX','tag-i','ti'],
  accept:  ['ACCEPT','tag-a','ta'],
  reject:  ['REJECT','tag-r','tr'],
  offer:   ['OFFER','tag-o','to'],
  delivery:['DELIVERY','tag-d','td'],
  proactive:['PROACTIVO','tag-p','tp'],
  send:    ['OUT','tag-s','ts2'],
  sync:    ['BUTLER','tag-d','td'],
};
function fmt(o){ return Object.entries(o||{}).map(([k,v])=>`${k}:${v}`).join(', ')||'{}'; }

function addEv(ev){
  const feed=document.getElementById('feed');
  const [label,tcls,fcls]=TAGS[ev.kind]||['?','tag-s','ts2'];
  let body='';
  switch(ev.kind){
    case 'inbox':    body=`<b>${ev.from_||'?'}</b>: ${(ev.text||'').substring(0,110)}`; break;
    case 'accept':
    case 'offer':    body=`→ <b>${ev.to||'?'}</b> | ${fmt(ev.resources)}`; break;
    case 'reject':   body=`→ <b>${ev.to||'?'}</b>${ev.reason?' | '+ev.reason:''}`; break;
    case 'delivery': body=`← <b>${ev.from_||'?'}</b> | ${fmt(ev.resources)}`; break;
    case 'proactive':body=`🎯 necesito ${fmt(ev.resources)} | ofrezco ${fmt(ev.offered)}`; break;
    case 'send':     body=`→ <b>${ev.to}</b>: ${(ev.text||'').substring(0,90)}`; break;
    default:         body=JSON.stringify(ev).substring(0,100);
  }
  const d=document.createElement('div');
  d.className=`fi ${fcls}`;
  d.innerHTML=`<span class="ts">${ev.ts||''}</span><span class="tag ${tcls}">${label}</span><span class="body">${body}</span>`;
  feed.insertBefore(d,feed.firstChild);
  while(feed.children.length>200) feed.removeChild(feed.lastChild);
}
function clearFeed(){ document.getElementById('feed').innerHTML=''; }

// ── SSE ──
const es=new EventSource('/api/stream');
es.onmessage=e=>{ try{ addEv(JSON.parse(e.data)); }catch(_){} };
es.onopen=()=>{ document.getElementById('dot').style.background='var(--grn)'; };
es.onerror=()=>{ document.getElementById('dot').style.background='var(--red)'; };

// ── Manual send ──
async function sendMsg(){
  const ip=document.getElementById('agSel').value;
  const msg=document.getElementById('msgBox').value.trim();
  if(!ip){ alert('Selecciona un agente'); return; }
  if(!msg){ alert('Escribe un mensaje'); return; }
  const r=await fetch('/api/send',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({ip,message:msg})});
  const res=await r.json();
  if(res.status==='ok'){
    addEv({kind:'send',ts:new Date().toLocaleTimeString(),to:ip,text:msg.substring(0,90)});
    document.getElementById('msgBox').value='';
  } else alert('Error: '+(res.message||JSON.stringify(res)));
}

function fillGoal(){
  const gn=S.goal_needs||{}, inv=S.inventory||{}, g=new Set(S.target_resources||[]);
  const tr=Object.fromEntries(Object.entries(inv).filter(([k,v])=>!g.has(k)&&v>0));
  document.getElementById('msgBox').value=JSON.stringify({kind:'request',from_agent:ANAME,resources:gn,offered_resources:tr},null,2);
}
function fillOffer(){
  const inv=S.inventory||{}, g=new Set(S.target_resources||[]);
  const tr=Object.fromEntries(Object.entries(inv).filter(([k,v])=>!g.has(k)&&v>0));
  document.getElementById('msgBox').value=JSON.stringify({kind:'delivery',from_agent:ANAME,resources:tr},null,2);
}

// ── Boot ──
fetch('/api/events').then(r=>r.json()).then(evs=>evs.slice(-80).forEach(addEv)).catch(()=>{});
poll(); pollAgents();
setInterval(poll,3000);
setInterval(pollAgents,20000);
</script>
</body>
</html>
